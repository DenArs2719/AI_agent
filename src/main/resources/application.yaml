spring:
  application:
    name: demo
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/shs_voice_ai}
    username: ${SPRING_DATASOURCE_USERNAME:shs_user}
    password: ${SPRING_DATASOURCE_PASSWORD:shs_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
  mail:
    host: ${MAIL_HOST:smtp.example.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:replace-me}
    password: ${MAIL_PASSWORD:replace-me}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  twilio:
    account-sid: ${TWILIO_ACCOUNT_SID:replace-me}
    auth-token: ${TWILIO_AUTH_TOKEN:replace-me}
    phone-number: ${TWILIO_PHONE_NUMBER:replace-me}
  ai:
    api-key: ${AI_API_KEY:replace-me}
  email:
    from: ${MAIL_FROM:noreply@example.com}
